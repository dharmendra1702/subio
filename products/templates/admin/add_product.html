{% load static %}
<link rel="stylesheet" href="{% static 'css/admin/add_product.css' %}">

<div class="container">
    <a href="javascript:history.back()" class="back-btn">← Back</a>

    <form method="POST" enctype="multipart/form-data" class="product-card" id="productForm">
        {% csrf_token %}

        <!-- IMAGE SECTION -->
        <div class="image-box">
            <h3>Product Images</h3>

            <div class="current-img-container">
                <input type="file" name="image" id="mainImg" hidden {% if not product %}required{% endif %}>
                <label for="mainImg" class="upload-main">
                    {% if product %}Change Main Image{% else %}Click to Upload Main Image{% endif %}
                </label>

                <img id="mainPreview"
                     {% if product %}src="{{ product.image.url }}" style="display:block;"{% endif %}>
            </div>

            <h4>Gallery Images</h4>
            <input type="file" name="gallery" id="gallery" multiple hidden>
            <label for="gallery" class="upload-main">+ Add Gallery Images</label>

            <div id="galleryPreview">
                {% if product %}
                    {% for img in product.images.all %}
                        <img src="{{ img.image.url }}">
                    {% endfor %}
                {% endif %}
            </div>
        </div>

        <!-- FORM -->
        <div class="form-box">

            <h2>Basic Info</h2>
            <input name="name" value="{{ product.name|default:'' }}" placeholder="Product name" required>
            <textarea name="description" placeholder="Description">{{ product.description|default:'' }}</textarea>

            <h2>Category</h2>
            <select name="category" required>
                <option value="">Select Category</option>
                {% for c in categories %}
                <option value="{{ c.id }}" {% if product.category_id == c.id %}selected{% endif %}>
                    {{ c.name }}
                </option>
                {% endfor %}
            </select>

            <h2>Highlights</h2>
            <textarea name="highlights">{{ product.highlights|default:'' }}</textarea>

            <!-- ONLY shelf life (net_weight removed) -->
            <input name="shelf_life"
                   value="{{ product.shelf_life|default:'' }}"
                   placeholder="Shelf Life (e.g., 9 Months)">

            <!-- VARIANTS -->
            <h2>Variants</h2>

            <div id="variants">
                {% if product %}
                    {% for v in product.variants.all %}
                        <div class="variant-row">
                            <div class="variant-card">
                                <input name="variant_size[]" value="{{ v.size }}" placeholder="Size (500g)" required>
                                <input name="variant_mrp[]" type="number" value="{{ v.mrp }}" placeholder="MRP ₹" required>
                                <input name="variant_price[]" type="number" value="{{ v.price }}" placeholder="Selling Price ₹" required>

                                <button type="button" class="remove-var-btn"
                                        onclick="this.closest('.variant-row').remove()">✕</button>
                            </div>
                        </div>
                    {% endfor %}
                {% endif %}
            </div>

            <button type="button" class="add-btn" onclick="addVariant()">
                + Add Variant
            </button>

            <button type="submit" class="submit">
                {% if product %}Update Product{% else %}Save Product{% endif %}
            </button>

        </div>
    </form>
</div>

<script>
const mainImg = document.getElementById("mainImg");
const mainPreview = document.getElementById("mainPreview");
const gallery = document.getElementById("gallery");
const galleryPreview = document.getElementById("galleryPreview");
const variants = document.getElementById("variants");

/* IMAGE PREVIEW */
mainImg.onchange = e => {
    const file = e.target.files[0];
    if (file) {
        mainPreview.src = URL.createObjectURL(file);
        mainPreview.style.display = "block";
    }
};

gallery.onchange = e => {
    galleryPreview.innerHTML = "";

    [...e.target.files].forEach(file => {
        let div = document.createElement("div");
        div.className = "gallery-item";

        let img = document.createElement("img");
        img.src = URL.createObjectURL(file);

        div.appendChild(img);
        galleryPreview.appendChild(div);
    });
};

/* VARIANT ADD */
function addVariant() {
    let div = document.createElement("div");
    div.className = "variant-row";

    div.innerHTML = `
        <div class="variant-card">
            <input name="variant_size[]" placeholder="Size (500g)" required>
            <input name="variant_mrp[]" type="number" placeholder="MRP ₹" required>
            <input name="variant_price[]" type="number" placeholder="Selling Price ₹" required>
            <button type="button" class="remove-var-btn" onclick="this.closest('.variant-row').remove()">✕</button>
        </div>
    `;

    variants.appendChild(div);
}

/* ADD ONE VARIANT BY DEFAULT */
{% if not product %}
window.onload = () => addVariant();
{% endif %}

document.getElementById("productForm").onsubmit = function () {
    if (!mainImg.files.length) {
        alert("Main image is required");
        return false;
    }

    if (variants.children.length === 0) {
        alert("Add at least one variant");
        return false;
    }
};

{% if error %}
<p style="color:red;">{{ error }}</p>
{% endif %}
</script>

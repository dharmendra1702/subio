{% load static %}
<link rel="stylesheet" href="{% static 'css/admin/admin_products.css' %}">

<div class="layout">

<!-- SIDEBAR -->

<aside>

<h3>Categories</h3>

<a href="?" class="{% if not active_category %}active{% endif %}">All Products</a>

{% for c in categories %}
<a href="?category={{ c.id }}" class="{% if active_category == c.id|stringformat:'s' %}active{% endif %}">
{{ c.name }}
</a>
{% endfor %}

</aside>

<!-- MAIN -->

<main>
<a href="javascript:history.back()" class="back-btn">← Back</a>
<header>
<h2>Products</h2>
<a href="{% url 'add_product' %}" class="add">Add Product</a>
</header>

<div class="products">

{% for p in products %}

<div class="product">

<img src="{{ p.image.url }}">

<div class="details">

<h4>{{ p.name }}</h4>

<div class="row">
<span>₹{{ p.price }}</span>
<span class="stock {% if p.stock < 5 %}low{% endif %}">
{{ p.stock }} left
</span>
</div>

<div class="actions">
<a href="{% url 'edit_product' p.id %}">Edit</a>
<a href="{% url 'delete_product' p.id %}">Delete</a>
</div>

</div>

</div>

{% endfor %}

</div>

</main>

</div>
